name: Deploy Backend → Railway

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

      - name: Wait for backend health endpoint
        if: ${{ secrets.BACKEND_HEALTHCHECK_URL != '' }}
        run: |
          for i in {1..20}; do
            if curl -fsS "${{ secrets.BACKEND_HEALTHCHECK_URL }}" > /dev/null; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting for backend to become healthy ($i/20)..."
            sleep 6
          done
          echo "Backend health check failed"
          exit 1
